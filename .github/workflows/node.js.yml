name: build-test-deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:

    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install dependencies
      run: npm install

    - name: Install Playwright browsers and Linux deps
      run: npx playwright install --with-deps

    - name: run server
      run: npm run server &

    - name: start server
      run: npm run start &

    - name: Run tests
      run: npm test

